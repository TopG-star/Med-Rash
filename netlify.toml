# MedRash admin panel — Netlify deploy config.
#
# The Next.js app and its Netlify Functions both live under admin/.
# This file is at the repo root so Netlify picks it up before auto-detection.
# All path fields below are resolved relative to `base` (i.e. admin/).

[build]
  base    = "admin"
  command = "npm run build"
  publish = ".next"

# Netlify Functions for the participant-facing read/write surface (health,
# attempt-submit, ranked-eligibility, session-resolve, quiz-list, etc.).
# Resolved to admin/netlify/functions/ once `base` is applied.
[functions]
  directory    = "netlify/functions"
  node_bundler = "esbuild"

# Slice A5 phase 3 (Pillar 6) — nightly retention purge for audit tables.
# Runs the admin/netlify/functions/audit-retention-purge.ts handler at
# 03:17 UTC daily. Off-the-hour to avoid colliding with other cron jobs
# that prefer round times. pg_cron is NOT enabled in this Supabase
# project, so this is the canonical cleanup path for app.auth_events and
# app.admin_audit rows whose expire_at (default = insert + 730 days) has
# passed.
[functions."audit-retention-purge"]
  schedule = "17 3 * * *"

# Phase 1 (P1.4) — daily KPI digest for managers.
# Runs admin/netlify/functions/kpi-digest.ts at 08:00 UTC daily, aggregating
# the previous UTC day's session activity via app.session_kpis_for_date(date)
# (migration 020). POSTs a Slack-shaped JSON payload to
# MEDRASH_KPI_DIGEST_WEBHOOK_URL when set; otherwise exits 200 as a no-op
# heartbeat that still validates the aggregate query.
[functions."kpi-digest"]
  schedule = "0 8 * * *"

[build.environment]
  # Node 22 required: @supabase/supabase-js Realtime client needs native
  # WebSocket (absent in Node 20). Next 16 supports Node 22.
  NODE_VERSION = "22"
  NPM_FLAGS    = "--no-audit --no-fund"

# Required for Next.js App Router (SSR, Route Handlers, dynamic params).
# Without this plugin, Netlify would deploy a static .next/ directory and
# every server-rendered route (/quiz-bank, /sessions, /reports, etc.) would
# 404. Plugin auto-wires the SSR adapter + image CDN.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# -----------------------------------------------------------------------------
# P7 — Navii avatar pretty URL.
#
# Public asset endpoint used by the Flutter participant client. The
# function lives at admin/netlify/functions/avatar.ts (so it ships with
# the same Netlify site as the rest of the admin functions). The
# redirect gives us a stable, CDN-friendly URL shape that survives any
# future re-host without touching the client.
#
# Examples:
#   /avatar/<seed>.svg              → 96×96, seed-derived background
#   /avatar/<seed>.svg?size=160     → 160×160
#   /avatar/<seed>.svg?background=ring
# -----------------------------------------------------------------------------

[[redirects]]
  from   = "/avatar/:seed.svg"
  to     = "/.netlify/functions/avatar?seed=:seed"
  status = 200
  force  = true

# -----------------------------------------------------------------------------
# Slice A4 — Edge security headers (admin Next.js surface)
#
# Defence-in-depth: same headers also set in admin/next.config.ts
# `async headers()` so a Netlify config drift cannot silently un-secure the
# admin app, and vice versa.
#
# CSP ships as Content-Security-Policy-Report-Only on first deploy so the
# browser console surfaces violations without blocking. After ~24h of clean
# admin browsing (login, dashboard, quiz-bank, sessions, reports,
# intelligence, admin-users), flip the header name to
# `Content-Security-Policy` in this file AND in admin/next.config.ts in a
# follow-up commit.
#
# Allowances explained:
#   - script-src 'unsafe-inline': Next.js inlines its runtime + RSC payloads
#     in <script> tags. Hashing/nonce-ing every Next inline is non-trivial;
#     plan deferral.
#   - style-src 'unsafe-inline': Tailwind v4 + Next.js fonts inject inline
#     style blocks. Same trade-off as script-src.
#   - connect-src wss://*.supabase.co: Supabase Realtime uses WebSocket.
#   - font-src 'self': next/font/google self-hosts fonts at build time, so
#     no third-party font origin is needed at runtime.
# -----------------------------------------------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.ingest.sentry.io https://*.ingest.us.sentry.io https://ingesteer.services-prod.nsvcs.net; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

