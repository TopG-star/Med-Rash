<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Quiz Runner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;800&amp;family=Hanken+Grotesk:wght@500;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-dot-pattern {
            background-image: radial-gradient(circle, #cfc6af 1px, transparent 1px);
            background-size: 8px 8px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "surface-container": "#eeeeee",
                        "on-primary": "#ffffff",
                        "secondary-container": "#73f6fb",
                        "on-secondary-fixed": "#002021",
                        "surface-tint": "#705d00",
                        "secondary": "#00696c",
                        "surface-container-highest": "#e2e2e2",
                        "primary-fixed-dim": "#e4c542",
                        "primary-container": "#ffde59",
                        "tertiary-fixed": "#ffd8e9",
                        "on-tertiary-fixed": "#3c0029",
                        "primary": "#705d00",
                        "on-surface": "#1b1b1b",
                        "on-secondary-container": "#007073",
                        "inverse-primary": "#e4c542",
                        "background": "#f9f9f9",
                        "secondary-fixed-dim": "#52d9de",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e2e2e2",
                        "outline-variant": "#cfc6af",
                        "on-background": "#1b1b1b",
                        "inverse-on-surface": "#f1f1f1",
                        "surface-container-high": "#e8e8e8",
                        "tertiary-fixed-dim": "#ffaed8",
                        "tertiary-container": "#ffd4e7",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "inverse-surface": "#303030",
                        "outline": "#7e7763",
                        "on-secondary-fixed-variant": "#004f52",
                        "surface-bright": "#f9f9f9",
                        "tertiary": "#ad1d7f",
                        "primary-fixed": "#ffe16e",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#b22383",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#4c4735",
                        "on-primary-fixed-variant": "#544600",
                        "surface-dim": "#dadada",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#890063",
                        "secondary-fixed": "#73f6fb",
                        "on-error": "#ffffff",
                        "on-primary-container": "#756100",
                        "on-primary-fixed": "#221b00",
                        "surface": "#f9f9f9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "shadow-offset": "4px",
                        "container-margin": "20px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "base": "8px",
                        "stack-lg": "24px",
                        "border-width": "3px"
                    },
                    "fontFamily": {
                        "body-md": ["Hanken Grotesk", "sans-serif"],
                        "label-caps": ["Hanken Grotesk", "sans-serif"],
                        "headline-md": ["Anybody", "sans-serif"],
                        "headline-lg": ["Anybody", "sans-serif"],
                        "headline-lg-mobile": ["Anybody", "sans-serif"],
                        "headline-sm": ["Anybody", "sans-serif"],
                        "data-point": ["Anybody", "sans-serif"],
                        "body-lg": ["Hanken Grotesk", "sans-serif"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "500" }],
                        "label-caps": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "800" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "800" }],
                        "headline-lg": ["32px", { "lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.1", "fontWeight": "800" }],
                        "headline-sm": ["20px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "data-point": ["16px", { "lineHeight": "1", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background dark:bg-background text-on-background dark:text-on-background font-body-md h-screen flex flex-col bg-dot-pattern">
<!-- TopAppBar -->
<header class="bg-background dark:bg-background text-on-background dark:text-on-background w-full top-0 px-container-margin py-base border-b-3 border-on-background flex items-center justify-between w-full h-16 sticky z-50">
<button aria-label="Go back" class="text-on-background hover:opacity-80 active:translate-x-1 active:translate-y-1 transition-all">
<span class="material-symbols-outlined text-2xl" data-icon="close">close</span>
</button>
<h1 class="font-anybody text-headline-lg-mobile dark:text-on-background uppercase text-center flex-1">QUIZ</h1>
<div class="w-6"></div> <!-- Spacer for balance -->
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col p-container-margin gap-stack-lg overflow-y-auto">
<!-- Progress Bar & Meta -->
<div class="flex flex-col gap-stack-sm w-full max-w-md mx-auto">
<div class="flex justify-between items-center px-1">
<span class="font-data-point text-data-point text-on-surface-variant">Question 2 of 5</span>
<div class="flex items-center gap-1 text-tertiary">
<span class="material-symbols-outlined" data-icon="timer" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-data-point text-data-point">00:45</span>
</div>
</div>
<!-- Progress Bar Neo-Brutalist -->
<div class="w-full h-4 bg-surface-container-lowest border-[3px] border-on-background rounded-full overflow-hidden relative shadow-[2px_2px_0_0_rgba(0,0,0,1)]">
<div class="h-full bg-primary-container absolute left-0 top-0 border-r-[3px] border-on-background" style="width: 40%;"></div>
</div>
</div>
<!-- Question Category Chip -->
<div class="flex justify-center w-full">
<span class="bg-secondary-container text-on-secondary-fixed-variant px-3 py-1 rounded-full border-[2px] border-on-background font-label-caps text-label-caps uppercase inline-flex items-center gap-1 shadow-[2px_2px_0_0_rgba(0,0,0,1)]">
<span class="material-symbols-outlined text-sm" data-icon="medication">medication</span>
                Infectious Diseases
            </span>
</div>
<!-- Question Card -->
<div class="bg-surface-container-lowest border-[3px] border-on-background rounded-xl p-stack-lg shadow-[4px_4px_0_0_rgba(0,0,0,1)] w-full max-w-md mx-auto flex flex-col gap-stack-lg relative mt-4">
<!-- Pin decoration top right -->
<div class="absolute -top-3 -right-3 w-6 h-6 bg-tertiary-fixed border-[2px] border-on-background rounded-full shadow-[2px_2px_0_0_rgba(0,0,0,1)] z-10 flex items-center justify-center">
<div class="w-2 h-2 bg-on-background rounded-full"></div>
</div>
<h2 class="font-headline-sm text-headline-sm text-center">What is the recommended first-line treatment for uncomplicated malaria in Ghana?</h2>
<!-- Options Form -->
<form class="flex flex-col gap-stack-md">
<!-- Option 1: Inactive -->
<label class="group relative block cursor-pointer">
<input class="peer sr-only" name="quiz_option" type="radio" value="A"/>
<div class="bg-surface-container-lowest border-[3px] border-on-background rounded-xl p-stack-md flex items-center gap-stack-md transition-all shadow-[4px_4px_0_0_rgba(0,0,0,1)] peer-checked:bg-primary-container peer-checked:shadow-[0px_0px_0_0_rgba(0,0,0,1)] peer-checked:translate-y-1 peer-checked:translate-x-1 hover:bg-surface-container-high">
<div class="w-8 h-8 flex-shrink-0 bg-surface-variant border-[2px] border-on-background rounded-full flex items-center justify-center font-data-point text-data-point peer-checked:bg-on-background peer-checked:text-surface-container-lowest transition-colors">A</div>
<span class="font-body-lg text-body-lg flex-1">Artesunate-Amodiaquine</span>
</div>
</label>
<!-- Option 2: Active/Selected State Example -->
<label class="group relative block cursor-pointer">
<input checked="" class="peer sr-only" name="quiz_option" type="radio" value="B"/>
<div class="bg-surface-container-lowest border-[3px] border-on-background rounded-xl p-stack-md flex items-center gap-stack-md transition-all shadow-[4px_4px_0_0_rgba(0,0,0,1)] peer-checked:bg-primary-container peer-checked:shadow-[0px_0px_0_0_rgba(0,0,0,1)] peer-checked:translate-y-[4px] peer-checked:translate-x-[4px] hover:bg-surface-container-high">
<div class="w-8 h-8 flex-shrink-0 bg-on-background text-surface-container-lowest border-[2px] border-on-background rounded-full flex items-center justify-center font-data-point text-data-point transition-colors">B</div>
<span class="font-body-lg text-body-lg flex-1 font-bold">Artemether-Lumefantrine</span>
</div>
</label>
<!-- Option 3: Inactive -->
<label class="group relative block cursor-pointer">
<input class="peer sr-only" name="quiz_option" type="radio" value="C"/>
<div class="bg-surface-container-lowest border-[3px] border-on-background rounded-xl p-stack-md flex items-center gap-stack-md transition-all shadow-[4px_4px_0_0_rgba(0,0,0,1)] peer-checked:bg-primary-container peer-checked:shadow-[0px_0px_0_0_rgba(0,0,0,1)] peer-checked:translate-y-1 peer-checked:translate-x-1 hover:bg-surface-container-high">
<div class="w-8 h-8 flex-shrink-0 bg-surface-variant border-[2px] border-on-background rounded-full flex items-center justify-center font-data-point text-data-point peer-checked:bg-on-background peer-checked:text-surface-container-lowest transition-colors">C</div>
<span class="font-body-lg text-body-lg flex-1">Quinine</span>
</div>
</label>
<!-- Option 4: Inactive -->
<label class="group relative block cursor-pointer">
<input class="peer sr-only" name="quiz_option" type="radio" value="D"/>
<div class="bg-surface-container-lowest border-[3px] border-on-background rounded-xl p-stack-md flex items-center gap-stack-md transition-all shadow-[4px_4px_0_0_rgba(0,0,0,1)] peer-checked:bg-primary-container peer-checked:shadow-[0px_0px_0_0_rgba(0,0,0,1)] peer-checked:translate-y-1 peer-checked:translate-x-1 hover:bg-surface-container-high">
<div class="w-8 h-8 flex-shrink-0 bg-surface-variant border-[2px] border-on-background rounded-full flex items-center justify-center font-data-point text-data-point peer-checked:bg-on-background peer-checked:text-surface-container-lowest transition-colors">D</div>
<span class="font-body-lg text-body-lg flex-1">Sulfadoxine-Pyrimethamine</span>
</div>
</label>
</form>
</div>
<!-- Action Area (Submit/Next) - Anchored bottom in flow -->
<div class="w-full max-w-md mx-auto mt-auto pt-stack-lg pb-stack-lg">
<button class="w-full bg-secondary-container text-on-secondary-fixed-variant border-[3px] border-on-background rounded-xl py-4 px-6 font-headline-sm text-headline-sm uppercase shadow-[4px_4px_0_0_rgba(0,0,0,1)] hover:bg-secondary-fixed active:translate-y-[4px] active:translate-x-[4px] active:shadow-[0px_0px_0_0_rgba(0,0,0,1)] transition-all flex items-center justify-center gap-2" type="button">
                Submit Answer
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<!-- Suppressed BottomNavBar & NavigationDrawer as this is a linear/transactional focused task -->
</body></html>
