<style>
        .dot-grid {
            background-image: radial-gradient(circle, #cfc6af 1px, transparent 1px);
            background-size: 16px 16px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background dot-grid min-h-screen flex flex-col font-body-md antialiased pb-20">
<!-- TopAppBar -->
<header class="flex items-center justify-between w-full h-16 w-full top-0 px-container-margin py-base border-b-3 border-on-background bg-background dark:bg-background z-10 sticky">
<button class="text-on-background hover:opacity-80 transition-all active:translate-x-1 active:translate-y-1 p-2 -ml-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<h1 class="font-anybody text-headline-md uppercase text-on-background flex-1 text-center">JOIN THE ACADEMY</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-container-margin py-stack-lg gap-stack-lg max-w-lg mx-auto w-full">
<!-- Onboarding Form -->
<section class="flex flex-col gap-stack-md">
<div class="flex flex-col gap-stack-sm">
<label class="font-hankenGrotesk text-label-caps text-on-surface-variant uppercase ml-1" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-lowest border-3 border-on-background rounded-[16px] px-4 py-3 font-hankenGrotesk text-body-md text-on-background placeholder:text-outline focus:outline-none focus:ring-0 focus:border-on-background shadow-[0_4px_0_0_rgba(27,27,27,1)] transition-transform active:translate-y-1 active:shadow-none mb-1" id="fullName" placeholder="Enter your full name" type="text"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-hankenGrotesk text-label-caps text-on-surface-variant uppercase ml-1" for="facility">Facility</label>
<input class="w-full bg-surface-container-lowest border-3 border-on-background rounded-[16px] px-4 py-3 font-hankenGrotesk text-body-md text-on-background placeholder:text-outline focus:outline-none focus:ring-0 focus:border-on-background shadow-[0_4px_0_0_rgba(27,27,27,1)] transition-transform active:translate-y-1 active:shadow-none mb-1" id="facility" placeholder="e.g. Korle-Bu Teaching Hospital" type="text"/>
</div>
<div class="flex flex-col gap-stack-sm">
<label class="font-hankenGrotesk text-label-caps text-on-surface-variant uppercase ml-1" for="specialty">Specialty</label>
<div class="relative">
<select class="appearance-none w-full bg-surface-container-lowest border-3 border-on-background rounded-[16px] px-4 py-3 pr-10 font-hankenGrotesk text-body-md text-on-background focus:outline-none focus:ring-0 focus:border-on-background shadow-[0_4px_0_0_rgba(27,27,27,1)] transition-transform active:translate-y-1 active:shadow-none mb-1 cursor-pointer" id="specialty">
<option class="text-outline" disabled="" selected="" value="">Select your specialty</option>
<option value="general">General Practice</option>
<option value="cardio">Cardiology</option>
<option value="neuro">Neurology</option>
<option value="pediatrics">Pediatrics</option>
<option value="surgery">Surgery</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-background pb-1">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</section>
<!-- Nickname Card -->
<section class="mt-4">
<h2 class="font-hankenGrotesk text-label-caps text-on-surface-variant uppercase ml-1 mb-stack-sm">Your Auto-Generated Tag</h2>
<div class="bg-secondary-container border-3 border-on-background rounded-xl p-4 flex items-center justify-between shadow-[4px_4px_0px_0px_rgba(27,27,27,1)] group hover:-translate-y-1 hover:shadow-[6px_6px_0px_0px_rgba(27,27,27,1)] transition-all cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full border-2 border-on-background overflow-hidden bg-primary-container flex items-center justify-center shrink-0">
<img alt="Avatar for SwiftDoctor777" class="w-full h-full object-cover" data-alt="A brightly colored, stylized avatar generated in a flat vector style with a yellow background, typical of a gamified profile icon." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBua1NQjIXCW8Ei1YqCSyVW5xzAifFBEs6YoZoRmCYA6HCGRUK9KZYhMNTo_jwQF9znfA2Cib6cxPyMSWq1f5TvucR6i3GPXwIVHeRKhjOd9pcOnVTPgKDT4hKOqJbHmgTzu-qDee2egG3W16S6A8r7YO8elpz8xy37xb76b2zJZa6cgn3RGtaBeyslGmx7rQgYuL4fKjgUO315r0PC4hP4jaoB2uE6lCEifEMJZdI62sv3LWG2vFytcpL-sV4SMqjvZ3rMQSVmiQ"/>
</div>
<div>
<p class="font-anybody text-headline-sm text-on-secondary-fixed">SwiftDoctor777</p>
<p class="font-hankenGrotesk text-label-caps text-on-secondary-fixed opacity-80 mt-1">Ready for the leaderboard</p>
</div>
</div>
<button class="w-10 h-10 bg-surface-container-lowest border-2 border-on-background rounded-full flex items-center justify-center shadow-[2px_2px_0px_0px_rgba(27,27,27,1)] active:translate-y-0.5 active:translate-x-0.5 active:shadow-[0px_0px_0px_0px_rgba(27,27,27,1)] transition-all text-on-background">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">edit</span>
</button>
</div>
</section>
<!-- Spacer to push button to bottom if needed, but fixed spacing is good here -->
<div class="flex-1"></div>
<!-- Call to Action -->
<div class="pt-stack-md mt-4 pb-8">
<button class="w-full bg-primary-container border-3 border-on-background text-on-background font-anybody text-headline-sm py-4 rounded-xl shadow-[4px_4px_0_0_rgba(27,27,27,1)] hover:bg-primary-fixed hover:-translate-y-1 hover:shadow-[6px_6px_0_0_rgba(27,27,27,1)] active:translate-y-1 active:translate-x-1 active:shadow-[0_0_0_0_rgba(27,27,27,1)] transition-all uppercase tracking-wide">
                Start Playing
            </button>
</div>
</main>
</body></html>
