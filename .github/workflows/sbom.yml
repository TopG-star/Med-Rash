name: SBOM

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cyclonedx:
    name: CycloneDX SBOM (admin + app)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Install cdxgen
        run: npm install --global @cyclonedx/cdxgen@^11

      - name: Install admin deps
        working-directory: admin
        run: npm ci --ignore-scripts

      - name: Pub get
        working-directory: app
        run: flutter pub get

      - name: Generate admin SBOM
        run: cdxgen -o sbom-admin.cdx.json -t javascript admin/

      - name: Generate app SBOM
        run: cdxgen -o sbom-app.cdx.json -t dart app/

      - name: Upload SBOMs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.ref_name }}
          path: |
            sbom-admin.cdx.json
            sbom-app.cdx.json

      - name: Attach SBOMs to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sbom-admin.cdx.json
            sbom-app.cdx.json
