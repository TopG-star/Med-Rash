version: 2
updates:
  # Admin Next.js dependencies
  - package-ecosystem: npm
    directory: /admin
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - admin
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      next-react:
        patterns:
          - 'next'
          - 'eslint-config-next'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      supabase:
        patterns:
          - '@supabase/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      test-tooling:
        patterns:
          - 'vitest'
          - '@vitest/*'

  # Flutter app dependencies
  - package-ecosystem: pub
    directory: /app
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - app
    commit-message:
      prefix: chore
      include: scope

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
