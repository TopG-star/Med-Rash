name: medrash_app
description: MedRash participant application.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  go_router: ^16.0.0
  http: ^1.2.2
  shared_preferences: ^2.3.2
  mobile_scanner: ^7.2.0
  flutter_svg: ^2.0.10+1
  flutter_cache_manager: ^3.4.1
  # Slice B7 — client-side telemetry. DSN is supplied at build time via
  # --dart-define=SENTRY_DSN=...; when empty, SentryFlutter.init no-ops.
  sentry_flutter: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
