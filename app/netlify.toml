# MedRash participant web app (Flutter Web) — Netlify deploy config.
#
# When creating the Netlify site:
#   - Connect the same GitHub repo (TopG-star/Med-Rash)
#   - Set "Base directory" in the UI to `app` (overrides the repo-root
#     netlify.toml which targets `admin`)
#   - Set "Branch to deploy" to `main`
#
# This file is then read instead of the root netlify.toml because Netlify
# searches the resolved base directory first.
#
# The participant app is a pure static SPA — no Netlify Functions live here.
# All server logic stays on the admin site at
# https://thriving-gingersnap-2f2932.netlify.app/.netlify/functions/*

[build]
  base    = "app"
  command = "bash scripts/build-web.sh"
  publish = "build/web"

[build.environment]
  # Pin Flutter to a stable channel + version. Override in Netlify UI to
  # upgrade without a code change. Must ship Dart ≥3.7 so mobile_scanner
  # ^7.2.0 resolves; 3.38.9 mirrors the local dev SDK (Dart 3.10.8).
  FLUTTER_VERSION = "3.38.9"
  FLUTTER_CHANNEL = "stable"

# go_router uses path-based URLs (e.g. /session/KBTH-CME-2026, /home,
# /leaderboard). Without this rewrite, every direct visit or QR scan to a
# non-root path would 404 because the SPA shell isn't served.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Reasonable defaults for a static SPA. The hashed Flutter assets bust
# their own cache so we can serve them with a long max-age, while the
# entry point HTML must always be fresh so users get the latest build.
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# -----------------------------------------------------------------------------
# Slice A4 — Edge security headers (participant Flutter web surface)
#
# CSP ships as Content-Security-Policy-Report-Only on first deploy so the
# browser console surfaces violations without blocking. After ~24h of clean
# participant browsing (QR scan / join code → quiz → leaderboard), flip the
# header name to `Content-Security-Policy` in a follow-up commit.
#
# Allowances specific to Flutter web:
#   - script-src 'wasm-unsafe-eval': CanvasKit + Skwasm renderers compile
#     WebAssembly via WebAssembly.instantiate; without this directive the
#     Flutter engine refuses to boot.
#   - script-src 'unsafe-inline': index.html ships an inline Turnstile shim
#     (window.medrashTurnstileExecute). Could be hashed; deferred.
#   - script-src https://challenges.cloudflare.com: Turnstile's api.js plus
#     the iframe sub-scripts it loads.
#   - frame-src + child-src https://challenges.cloudflare.com: invisible
#     Turnstile widget iframe.
#   - connect-src https://*.netlify.app: the Netlify functions origin
#     (currently medrash-admin.netlify.app and thriving-gingersnap-…).
#     Tighten to specific hosts once a stable production functions origin
#     is locked.
#   - worker-src 'self' blob: + child-src blob:: Flutter service worker
#     (flutter_service_worker.js) plus CanvasKit's blob-URL workers.
#   - img-src + font-src data: + blob:: Flutter rasterizes glyphs/images
#     into in-memory blobs for canvas drawing.
#   - Permissions-Policy camera=(self): mobile_scanner uses getUserMedia
#     for the QR scanner. Microphone/geolocation/payment/usb stay denied.
# -----------------------------------------------------------------------------

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(self), microphone=(), geolocation=(), payment=(), usb=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.netlify.app https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; child-src blob: https://challenges.cloudflare.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

